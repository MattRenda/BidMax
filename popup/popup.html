<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BidMax</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .logo {
      width: 32px; height: 32px; background: #22c55e;
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-weight: 900; font-size: 16px; color: #000;
    }
    .brand { font-weight: 800; font-size: 16px; }
    .version { font-size: 10px; color: #475569; }
    .status { padding: 12px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #1e293b; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .dot.warn { background: #f59e0b; }
    .dot.err { background: #ef4444; }
    .instructions {
      padding: 14px 16px;
      font-size: 12px; color: #94a3b8; line-height: 1.6;
    }
    .instructions strong { color: #f1f5f9; }
    .btn {
      display: block; margin: 0 16px 16px;
      background: #1e293b; border: 1px solid #334155;
      color: #f1f5f9; border-radius: 6px; padding: 8px 14px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      text-align: center; text-decoration: none;
    }
    .btn:hover { border-color: #22c55e; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">B</div>
    <div>
      <div class="brand">BidMax</div>
      <div class="version">v2.0.0</div>
    </div>
  </div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Checking server…</span>
  </div>
  <div class="instructions">
    <strong>How to use:</strong><br>
    Navigate to any BidRL auction page — BidMax will automatically fetch all lots, analyze them with AI, and show a <strong>🔥 Top Picks</strong> panel plus badges on every card.
  </div>
  <a class="btn" href="options/options.html" target="_blank">⚙ Settings</a>

  <script>
    async function checkServer() {
      const dot = document.getElementById('dot');
      const text = document.getElementById('status-text');
      try {
        const res = await chrome.storage.local.get('bidmax_settings');
        const settings = res.bidmax_settings || {};
        const url = settings.serverUrl || 'https://bidmax-production.up.railway.app';
        const r = await fetch(`${url}/api/health`, { signal: AbortSignal.timeout(4000) });
        if (r.ok) {
          text.textContent = 'Server connected ✓';
        } else {
          throw new Error();
        }
      } catch {
        dot.className = 'dot warn';
        text.textContent = 'Server unreachable — check Settings';
      }
    }
    checkServer();
  </script>
</body>
</html>
