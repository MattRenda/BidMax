<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Pro! — BidMax</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 48px 40px; text-align: center; max-width: 420px; }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    .badge { display: inline-block; background: #22c55e; color: #000; font-weight: 700; font-size: 13px; padding: 4px 14px; border-radius: 20px; margin-bottom: 24px; }
    .close-btn { display: inline-block; background: #22c55e; color: #000; font-weight: 700; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 15px; cursor: pointer; border: none; font-family: inherit; }
    .close-btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <div class="badge">PRO ACTIVATED</div>
    <h1>You're all set!</h1>
    <p>BidMax Pro is now active on your account. Enjoy unlimited auction analysis — go find some deals.</p>
    <button class="close-btn" onclick="window.close()">Close this tab</button>
  </div>
  <script>
    // Notify extension that pro is now active
    window.addEventListener('load', () => {
      setTimeout(() => window.close(), 5000);
    });
  </script>
</body>
</html>
